<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../css/admin.css">
    <title>Panel de Administración - Food Store</title>
</head>

<body>
    <header>
        <h1>Panel de Administración</h1>
        <nav>
            <ul>
                <li><a href="/src/pages/store/home/home.html">Volver a la Tienda</a></li>
                <li><a href="#" id="logoutButton">Cerrar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Gestión de Productos</h2>
            <form action="#" method="#">
                <button type="submit" class="btn-main">+ Nuevo Producto</button>
            </form>
        </section>

        <section>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="admin-products-body"></tbody>
            </table>
        </section>

        <section>
            <details class="admin-details">
                <summary>Agregar Producto Rápido</summary>
                <form class="admin-form">
                    <label for="nombre-prod">Nombre del Producto:</label>
                    <input id="nombre-prod" type="text" placeholder="Ej. Lomito Completo" required>

                    <label for="precio">Precio:</label>
                    <input id="precio" type="number" min="0" required>

                    <label for="categoria">Categoría:</label>
                    <select id="categoria" required>
                        <option value="">Elige una opción...</option>
                        <option value="hamburguesas">Hamburguesas</option>
                        <option value="pizzas">Pizzas</option>
                        <option value="papas">Papas Fritas</option>
                    </select>

                    <label for="descripcion">Descripción:</label>
                    <textarea id="descripcion" rows="4" placeholder="Ingresa los ingredientes..." required></textarea>

                    <button type="submit" class="btn-main">Guardar Producto</button>
                </form>
            </details>
        </section>
    </main>

    <footer>
        Panel de Administración - Food Store v1.0
    </footer>

    <script type="module" src="./home.ts"></script>
</body>

</html>
