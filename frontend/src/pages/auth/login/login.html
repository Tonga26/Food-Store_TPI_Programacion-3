<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../css/login.css">
    <title>Food Store - Iniciar Sesión</title>
</head>
<body>
    <div class="container">
        <form action="#" method="#" class="login-form" id="login-form">
            <h1>🍔 FOOD STORE</h1>
            <h2>Iniciar Sesión</h2>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" autocomplete="username" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" autocomplete="current-password" required>

            <button type="submit">INGRESAR</button>

            <p class="registro">
                ¿No tenés cuenta? <a href="../register/register.html">Registrate acá</a>
            </p>
        </form>
    </div>
    <script type="module" src="./login.ts"></script>
</body>
</html>
