<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../css/login.css">
    <title>Food Store - Login</title>
</head>
<body>
    <div class="container">
        <form action="#" method="#" class="registro-form" id="registro-form">
            <h1>FOOD STORE</h1>
            <h2>Regístrate</h2>

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>

            <label for="celular">Celular (opcional):</label>
            <input type="tel" id="celular" name="celular" placeholder="Tu número de celular">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
            
            <button type="submit">CREAR CUENTA</button>
        </form>
    </div>

    <script type="module" src="./registro.ts"></script>
</body>
</html>
