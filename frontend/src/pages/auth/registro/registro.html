<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../css/login.css">
    <title>Food Store - Crear Cuenta</title>
</head>
<body>
    <div class="container">
        <form action="#" method="#" class="login-form" id="registro-form">
            <h1>🍔 FOOD STORE</h1>
            <h2>Crear Cuenta</h2>

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" autocomplete="given-name" required>

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" autocomplete="family-name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" autocomplete="email" required>

            <label for="celular">Celular (opcional):</label>
            <input type="tel" id="celular" name="celular" placeholder="Tu número de celular" autocomplete="tel">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
            
            <button type="submit">CREAR CUENTA</button>

            <p class="registro">
                ¿Ya tenés cuenta? <a href="../login/login.html">Iniciá sesión acá</a>
            </p>
        </form>
    </div>
    <script type="module" src="./registro.ts"></script>
</body>
</html>
